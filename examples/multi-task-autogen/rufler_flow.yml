project:
  name: multi-task-autogen-demo
  description: |
    Multi-task mode with AI-driven decomposition. You give `task.main`
    (or `main_path`) a big goal; `rufler start` calls `claude -p` to split
    it into N subtasks, writes each one to `tasks/<name>.md`, and emits
    `auto_generated_task.yml` with the full group. Then it executes the
    generated group in the chosen run_mode.

memory:
  backend: hybrid
  namespace: multi-autogen

swarm:
  topology: hierarchical
  max_agents: 6
  strategy: specialized
  consensus: raft

task:
  multi: true
  autogenerated: true
  autogen_count: 4
  autogen_dir: .tasks
  autogen_file: .tasks/auto_generated_task.yml
  run_mode: sequential
  autonomous: true
  max_iterations: 80
  timeout_minutes: 120
  main: |
    Build a production-ready URL shortener service:
    - Go backend with Postgres persistence and Redis cache
    - REST API: POST /shorten, GET /:code (redirect), GET /:code/stats
    - Rate limiting per-IP
    - OpenTelemetry tracing
    - Docker Compose for local dev
    - Integration tests with testcontainers
    - GitHub Actions CI (lint + test + build)

execution:
  non_interactive: true
  yolo: true
  background: true
  log_file: .rufler/run.log

agents:
  - name: architect
    type: system-architect
    role: specialist
    seniority: lead
    prompt: |
      Read the current subtask. Design just that slice. Reuse decisions
      from prior subtasks via shared memory.

  - name: coder
    type: coder
    role: worker
    seniority: senior
    prompt: |
      Implement the current subtask per architect's design.

  - name: tester
    type: tester
    role: worker
    seniority: senior
    prompt: |
      Write tests covering the current subtask. Use testcontainers where
      external services are needed.

  - name: reviewer
    type: reviewer
    role: specialist
    seniority: senior
    prompt: |
      Gate each subtask: lint, test, no panics on malformed input.
